<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- Title bar (draggable) -->
    <div id="titlebar">
      <div class="titlebar-left">
        <span class="logo">◈</span>
        <span class="title">Claude Sessions</span>
        <span id="session-count" class="badge">0</span>
      </div>
      <div class="titlebar-left mini-summary">
        <canvas id="capybara" width="42" height="30"></canvas>
        <span id="mini-dots"></span>
      </div>
      <div id="island-drop-slot" class="island-drop-slot"></div>
      <div class="titlebar-right">
        <button id="btn-collection" class="tb-btn" title="Pet Collection"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1" y="1" width="5" height="5" rx="1" fill="currentColor" opacity="0.9"/><rect x="8" y="1" width="5" height="5" rx="1" fill="currentColor" opacity="0.5"/><rect x="1" y="8" width="5" height="5" rx="1" fill="currentColor" opacity="0.5"/><rect x="8" y="8" width="5" height="5" rx="1" fill="currentColor" opacity="0.3"/></svg></button>
        <button id="btn-mini" class="tb-btn" title="Toggle mini mode"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="2" y="4" width="10" height="6" rx="3" stroke="currentColor" stroke-width="1.5"/></svg></button>
        <button id="btn-theme" class="tb-btn" title="Theme"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="5.5" stroke="currentColor" stroke-width="1.3"/><path d="M7 1.5A5.5 5.5 0 0 1 7 12.5Z" fill="currentColor"/></svg></button>
        <button id="btn-pin" class="tb-btn" title="Toggle always on top"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v8M4 3.5l3-2 3 2v4l-3 2-3-2z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/><line x1="7" y1="9" x2="7" y2="13" stroke="currentColor" stroke-width="1.3"/></svg></button>
        <button id="btn-minimize" class="tb-btn" title="Minimize to tray"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><line x1="3" y1="7" x2="11" y2="7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></button>
      </div>
    </div>

    <!-- Session list -->
    <div id="sessions">
      <div id="empty-state">
        <div class="empty-icon">◇</div>
        <div class="empty-text">No active sessions</div>
        <div class="empty-sub">Start Claude Code in a terminal to see it here</div>
      </div>
    </div>

    <!-- Status bar -->
    <div id="statusbar">
      <span id="status-dot" class="dot dot-disconnected"></span>
      <span id="status-text">Connecting...</span>
    </div>
  </div>

  <!-- Theme picker -->
  <div id="theme-picker" class="theme-picker">
    <div class="theme-picker-title">Theme</div>
    <div class="theme-swatches">
      <div class="theme-swatch active" data-theme="dark" title="Dark"></div>
      <div class="theme-swatch" data-theme="light" title="Light"></div>
      <div class="theme-swatch" data-theme="glass" title="Glass"></div>
      <div class="theme-swatch" data-theme="cyber" title="Cyberpunk"></div>
    </div>
    <div class="opacity-row">
      <label>Opacity</label>
      <input type="range" class="opacity-slider" id="opacity-slider" min="20" max="100" value="100">
    </div>
  </div>

  <!-- Pet Collection overlay -->
  <div id="collection-overlay" class="collection-overlay">
    <div class="collection-panel">
      <div class="collection-header">
        <span class="collection-title">Pet Collection</span>
        <span id="collection-count" class="collection-count">0/14</span>
        <button id="collection-close" class="collection-close">&times;</button>
      </div>
      <div id="collection-grid" class="collection-grid"></div>
    </div>
  </div>

  <script src="pets.js"></script>
  <script src="app.js"></script>
</body>
</html>
